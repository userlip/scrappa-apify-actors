name: Actor Tests

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - 'actors/**'
      - '.github/workflows/actor-tests.yml'

jobs:
  discover-testable-actors:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover actor packages with tests
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          matrix="$(
            python3 -c '
import json
from pathlib import Path

actors = []

for package_json in sorted(Path("actors").glob("*/package.json")):
    data = json.loads(package_json.read_text())
    if (data.get("scripts") or {}).get("test"):
        actors.append({"path": str(package_json.parent)})

print(json.dumps(actors))
'
          )"

          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "Discovered testable actors: ${matrix}"

  test-actors:
    needs: discover-testable-actors
    if: ${{ needs.discover-testable-actors.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        actor: ${{ fromJson(needs.discover-testable-actors.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.actor.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.actor.path }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.actor.path }}
        run: npm test
