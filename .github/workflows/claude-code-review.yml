name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude-review:
    if: ${{ github.event.pull_request.head.repo.fork == false }}
    runs-on: [self-hosted, ci, github-actions]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect reviewer workflow changes
        id: review-workflow
        shell: bash
        run: |
          if git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" | grep -qx '.github/workflows/claude-code-review.yml'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure jq is available
        if: ${{ steps.review-workflow.outputs.changed != 'true' }}
        id: ensure-jq
        continue-on-error: true
        shell: bash
        run: |
          if command -v jq >/dev/null 2>&1; then
            exit 0
          fi

          if ! command -v apt-get >/dev/null 2>&1; then
            echo "::error::jq is required to parse broker responses, but apt-get is not available in this runner image."
            exit 1
          fi

          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          else
            apt-get update
            apt-get install -y jq
          fi

      - name: Fetch AI backend configuration
        if: ${{ steps.review-workflow.outputs.changed != 'true' }}
        id: ai-config
        continue-on-error: true
        env:
          RUNNER_MANAGER_URL: "https://ci.marin.sh"
        shell: bash
        run: |
          set -euo pipefail
          : "${RUNNER_MANAGER_URL:?RUNNER_MANAGER_URL is required}"

          oidc_response="$(curl -fsSL \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${RUNNER_MANAGER_URL%/}")"

          oidc_token="$(jq -er '.value | select(type == "string" and length > 0)' <<< "$oidc_response")"

          broker_response="$(curl -fsSL -X POST \
            -H "Authorization: Bearer ${oidc_token}" \
            -H "Accept: application/json" \
            "${RUNNER_MANAGER_URL%/}/api/broker/claude-code/token")"

          token="$(jq -er '.token | select(type == "string" and length > 0)' <<< "$broker_response")"
          token_type="$(jq -er '.token_type | select(type == "string" and length > 0)' <<< "$broker_response")"
          backend="$(jq -er '.backend // "claude_code_oauth"' <<< "$broker_response")"
          model="$(jq -er '.model // ""' <<< "$broker_response")"
          default_opus_model="$(jq -er '.default_opus_model // ""' <<< "$broker_response")"
          default_sonnet_model="$(jq -er '.default_sonnet_model // ""' <<< "$broker_response")"
          default_haiku_model="$(jq -er '.default_haiku_model // ""' <<< "$broker_response")"
          subagent_model="$(jq -er '.subagent_model // ""' <<< "$broker_response")"
          effort_level="$(jq -er '.effort_level // ""' <<< "$broker_response")"
          base_url="$(jq -er '.base_url // ""' <<< "$broker_response")"
          display_name="$(jq -er '.display_name // ""' <<< "$broker_response")"

          if [[ "$token_type" != "CLAUDE_CODE_OAUTH_TOKEN" && "$token_type" != "ANTHROPIC_API_KEY" ]]; then
            echo "::error::Unsupported AI backend token type: $token_type"
            exit 1
          fi

          validate_model_identifier() {
            local value="$1"
            local label="$2"

            if [[ -n "$value" && ! "$value" =~ ^[A-Za-z0-9][][A-Za-z0-9._:/@+-]{0,254}$ ]]; then
              echo "::error::Unsupported AI model identifier for ${label}: ${value}"
              exit 1
            fi
          }

          validate_model_identifier "$model" "ANTHROPIC_MODEL"
          validate_model_identifier "$default_opus_model" "ANTHROPIC_DEFAULT_OPUS_MODEL"
          validate_model_identifier "$default_sonnet_model" "ANTHROPIC_DEFAULT_SONNET_MODEL"
          validate_model_identifier "$default_haiku_model" "ANTHROPIC_DEFAULT_HAIKU_MODEL"
          validate_model_identifier "$subagent_model" "CLAUDE_CODE_SUBAGENT_MODEL"

          if [[ -n "$effort_level" && ! "$effort_level" =~ ^(minimal|low|medium|high|max)$ ]]; then
            echo "::error::Unsupported Claude Code effort level: $effort_level"
            exit 1
          fi

          echo "::add-mask::${token}"
          echo "::notice::Claude Code backend: ${display_name:-$backend} (${token_type}), model: ${model:-default}, base URL: ${base_url:-default}"
          {
            echo "token=${token}"
            echo "token_type=${token_type}"
            echo "backend=${backend}"
            echo "base_url=${base_url}"
            echo "model=${model}"
            echo "default_opus_model=${default_opus_model}"
            echo "default_sonnet_model=${default_sonnet_model}"
            echo "default_haiku_model=${default_haiku_model}"
            echo "subagent_model=${subagent_model}"
            echo "effort_level=${effort_level}"
            if [[ -n "$model" ]]; then
              echo "claude_args=--model ${model}"
            else
              echo "claude_args="
            fi
          } >> "$GITHUB_OUTPUT"

          {
            [[ -n "$base_url" ]] && echo "ANTHROPIC_BASE_URL=${base_url}"
            [[ -n "$model" ]] && echo "ANTHROPIC_MODEL=${model}"
            [[ -n "$default_opus_model" ]] && echo "ANTHROPIC_DEFAULT_OPUS_MODEL=${default_opus_model}"
            [[ -n "$default_sonnet_model" ]] && echo "ANTHROPIC_DEFAULT_SONNET_MODEL=${default_sonnet_model}"
            [[ -n "$default_haiku_model" ]] && echo "ANTHROPIC_DEFAULT_HAIKU_MODEL=${default_haiku_model}"
            [[ -n "$subagent_model" ]] && echo "CLAUDE_CODE_SUBAGENT_MODEL=${subagent_model}"
            [[ -n "$effort_level" ]] && echo "CLAUDE_CODE_EFFORT_LEVEL=${effort_level}"
          } >> "$GITHUB_ENV"

      - name: Skip Claude Code Review for workflow update
        if: ${{ steps.review-workflow.outputs.changed == 'true' }}
        shell: bash
        run: echo "Skipping Claude Code Review because this PR changes the review workflow."

      - name: Install Laravel Boost for Claude Code
        if: ${{ steps.review-workflow.outputs.changed != 'true' && steps.ai-config.outcome == 'success' }}
        id: laravel-boost
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f composer.json || ! -f artisan ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "claude_args=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cleanup_laravel_boost_changes() {
            if command -v git >/dev/null 2>&1 && git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
              git restore --worktree --staged . 2>/dev/null || true
            fi
          }

          trap cleanup_laravel_boost_changes EXIT

          if ! command -v composer >/dev/null 2>&1; then
            echo "::error::composer is required to install Laravel Boost for Claude Code."
            exit 1
          fi

          if ! composer show laravel/boost >/dev/null 2>&1; then
            composer require laravel/boost --dev --no-interaction --no-progress --no-ansi
          fi

          if ! APP_ENV=local APP_DEBUG=true php artisan list --raw | awk '{ print $1 }' | grep -qx 'boost:install'; then
            echo "::warning::Laravel Boost is installed, but the boost:install command is unavailable for this application."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "claude_args=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          boost_install_help="$(APP_ENV=local APP_DEBUG=true php artisan boost:install --help || true)"
          if ! grep -q -- '--guidelines' <<< "$boost_install_help" || ! grep -q -- '--skills' <<< "$boost_install_help" || ! grep -q -- '--mcp' <<< "$boost_install_help"; then
            echo "::warning::Installed Laravel Boost version does not support non-interactive Claude Code setup options; continuing without Boost."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "claude_args=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat > boost.json <<'JSON'
          {
              "agents": [
                  "claude_code"
              ],
              "guidelines": true,
              "mcp": true,
              "skills": []
          }
          JSON

          APP_ENV=local APP_DEBUG=true php artisan boost:install --guidelines --skills --mcp --no-interaction

          if [[ -d .claude/skills ]]; then
            mkdir -p "${HOME}/.claude/skills"
            cp -R .claude/skills/. "${HOME}/.claude/skills/"
          fi

          if [[ ! -f .mcp.json ]]; then
            echo "::warning::Laravel Boost did not generate an MCP configuration."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "claude_args=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mcp_config="$(jq -c . .mcp.json)"
          mcp_config="${mcp_config//\'/\'\\\'\'}"

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          {
            echo "claude_args<<CLAUDE_ARGS"
            echo "--mcp-config '${mcp_config}' --allowedTools \"mcp__laravel-boost__*\""
            echo "CLAUDE_ARGS"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Review
        if: ${{ steps.review-workflow.outputs.changed != 'true' && steps.ai-config.outcome == 'success' && steps.ai-config.outputs.token_type == 'CLAUDE_CODE_OAUTH_TOKEN' }}
        id: claude-review
        continue-on-error: true
        uses: anthropics/claude-code-action@ef50f123a3a9be95b60040d042717517407c7256
        env:
          ANTHROPIC_BASE_URL: ${{ steps.ai-config.outputs.base_url }}
          ANTHROPIC_AUTH_TOKEN: ${{ steps.ai-config.outputs.token }}
          ANTHROPIC_MODEL: ${{ steps.ai-config.outputs.model }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ steps.ai-config.outputs.default_opus_model }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ steps.ai-config.outputs.default_sonnet_model }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ steps.ai-config.outputs.default_haiku_model }}
          CLAUDE_CODE_SUBAGENT_MODEL: ${{ steps.ai-config.outputs.subagent_model }}
          CLAUDE_CODE_EFFORT_LEVEL: ${{ steps.ai-config.outputs.effort_level }}
        with:
          claude_code_oauth_token: ${{ steps.ai-config.outputs.token }}
          settings: |
            {
              "env": {
                "ANTHROPIC_BASE_URL": "${{ steps.ai-config.outputs.base_url }}",
                "ANTHROPIC_MODEL": "${{ steps.ai-config.outputs.model }}",
                "ANTHROPIC_DEFAULT_OPUS_MODEL": "${{ steps.ai-config.outputs.default_opus_model }}",
                "ANTHROPIC_DEFAULT_SONNET_MODEL": "${{ steps.ai-config.outputs.default_sonnet_model }}",
                "ANTHROPIC_DEFAULT_HAIKU_MODEL": "${{ steps.ai-config.outputs.default_haiku_model }}",
                "CLAUDE_CODE_SUBAGENT_MODEL": "${{ steps.ai-config.outputs.subagent_model }}"
              }
            }
          claude_args: ${{ steps.ai-config.outputs.claude_args }} ${{ steps.laravel-boost.outputs.claude_args }}
          plugin_marketplaces: https://github.com/obra/superpowers-marketplace.git
          plugins: superpowers@superpowers-marketplace
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            For Laravel projects, use Laravel Boost MCP tools, generated Boost guidelines, and relevant Boost skills such as laravel-best-practices before making framework-specific recommendations. Use Laravel documentation search through Boost when you need current Laravel, Filament, Livewire, Pest, Pint, or Tailwind guidance.

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

      - name: Run Claude Code Review with custom backend
        if: ${{ steps.review-workflow.outputs.changed != 'true' && steps.ai-config.outcome == 'success' && steps.ai-config.outputs.token_type == 'ANTHROPIC_API_KEY' }}
        id: claude-review-custom
        continue-on-error: true
        uses: anthropics/claude-code-action@ef50f123a3a9be95b60040d042717517407c7256
        env:
          ANTHROPIC_BASE_URL: ${{ steps.ai-config.outputs.base_url }}
          ANTHROPIC_AUTH_TOKEN: ${{ steps.ai-config.outputs.token }}
          ANTHROPIC_MODEL: ${{ steps.ai-config.outputs.model }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ steps.ai-config.outputs.default_opus_model }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ steps.ai-config.outputs.default_sonnet_model }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ steps.ai-config.outputs.default_haiku_model }}
          CLAUDE_CODE_SUBAGENT_MODEL: ${{ steps.ai-config.outputs.subagent_model }}
          CLAUDE_CODE_EFFORT_LEVEL: ${{ steps.ai-config.outputs.effort_level }}
        with:
          claude_code_oauth_token: ${{ steps.ai-config.outputs.token }}
          settings: |
            {
              "env": {
                "ANTHROPIC_BASE_URL": "${{ steps.ai-config.outputs.base_url }}",
                "ANTHROPIC_MODEL": "${{ steps.ai-config.outputs.model }}",
                "ANTHROPIC_DEFAULT_OPUS_MODEL": "${{ steps.ai-config.outputs.default_opus_model }}",
                "ANTHROPIC_DEFAULT_SONNET_MODEL": "${{ steps.ai-config.outputs.default_sonnet_model }}",
                "ANTHROPIC_DEFAULT_HAIKU_MODEL": "${{ steps.ai-config.outputs.default_haiku_model }}",
                "CLAUDE_CODE_SUBAGENT_MODEL": "${{ steps.ai-config.outputs.subagent_model }}"
              }
            }
          claude_args: ${{ steps.ai-config.outputs.claude_args }} ${{ steps.laravel-boost.outputs.claude_args }}
          plugin_marketplaces: https://github.com/obra/superpowers-marketplace.git
          plugins: superpowers@superpowers-marketplace
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            For Laravel projects, use Laravel Boost MCP tools, generated Boost guidelines, and relevant Boost skills such as laravel-best-practices before making framework-specific recommendations. Use Laravel documentation search through Boost when you need current Laravel, Filament, Livewire, Pest, Pint, or Tailwind guidance.

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

      - name: Warn when Claude review is unavailable
        if: ${{ steps.ensure-jq.outcome == 'failure' || steps.ai-config.outcome == 'failure' || steps.laravel-boost.outcome == 'failure' || steps.claude-review.outcome == 'failure' || steps.claude-review-custom.outcome == 'failure' }}
        shell: bash
        run: |
          echo "::warning::Claude review is currently unavailable due to an external AI service or authentication issue."
          {
            echo "## Claude review unavailable"
            echo
            echo "The Claude review action failed because the AI service, broker, or authentication configuration is currently unavailable to this repository."
            echo "Please restore AI backend access before relying on this workflow for automated review."
          } >> "$GITHUB_STEP_SUMMARY"
